<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transfer Annos</title>
<script src="pdf-lib.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    background: #f5f6fa;
    color: #222;
    text-align: center;
    padding: 30px;
  }
  .back-link { display:inline-block; margin-bottom:20px; color:#0078ff; text-decoration:none; }
  .back-link:hover { text-decoration:underline; }
  h1 { font-size:28px; font-weight:700; color:#1a1a2e; margin-bottom:8px; }
  .subtitle { color:#666; margin-bottom:30px; font-size:15px; }

  .upload-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .upload-box {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 28px;
    width: 320px;
    text-align: center;
  }
  .upload-box h3 { font-size: 15px; color:#333; margin-bottom:4px; font-weight:600; }
  .upload-box .hint { font-size:12px; color:#999; margin-bottom:14px; }
  .upload-box input[type="file"] { display:none; }
  .upload-box label {
    display: inline-block;
    padding: 12px 22px;
    background: #0078ff;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.15s;
  }
  .upload-box label:hover { background:#005fd1; }
  .file-name { display:block; margin-top:10px; font-size:13px; color:#666; font-style:italic; min-height:20px; }

  .arrow {
    display: flex;
    align-items: center;
    font-size: 32px;
    color: #bbb;
    user-select: none;
  }

  #transferBtn {
    display: none;
    margin: 0 auto;
    padding: 14px 36px;
    border-radius: 8px;
    border: none;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    background: #0078ff;
    transition: background 0.15s;
  }
  #transferBtn:hover { background:#005fd1; }
  #transferBtn:disabled { background:#aaa; cursor:default; }

  #status {
    margin: 20px auto;
    max-width: 700px;
    font-size: 13px;
    text-align: left;
    background: #fff;
    border-radius: 8px;
    padding: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    white-space: pre-wrap;
    display: none;
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back</a>
<h1>Transfer Annos</h1>
<p class="subtitle">Copy annotations from one PDF onto another</p>

<div class="upload-row">
  <div class="upload-box">
    <h3>Source PDF</h3>
    <p class="hint">The PDF with annotations</p>
    <label for="srcPdf">Select a PDF</label>
    <input type="file" id="srcPdf" accept="application/pdf" />
    <span id="srcPdfName" class="file-name"></span>
  </div>

  <div class="arrow">&rarr;</div>

  <div class="upload-box">
    <h3>Destination PDF</h3>
    <p class="hint">The PDF to receive them</p>
    <label for="dstPdf">Select a PDF</label>
    <input type="file" id="dstPdf" accept="application/pdf" />
    <span id="dstPdfName" class="file-name"></span>
  </div>
</div>

<button id="transferBtn">Transfer Annos</button>
<div id="status"></div>

<script>
var PDFDocument, PDFName, PDFArray, PDFDict, PDFString, PDFHexString, PDFNumber, PDFStream, PDFRef;
function ensurePdfLib(){
  if(!PDFDocument && typeof PDFLib !== 'undefined'){
    PDFDocument = PDFLib.PDFDocument;
    PDFName = PDFLib.PDFName;
    PDFArray = PDFLib.PDFArray;
    PDFDict = PDFLib.PDFDict;
    PDFString = PDFLib.PDFString;
    PDFHexString = PDFLib.PDFHexString;
    PDFNumber = PDFLib.PDFNumber;
    PDFStream = PDFLib.PDFStream;
    PDFRef = PDFLib.PDFRef;
  }
}

var statusEl = document.getElementById('status');
function log(msg){ statusEl.style.display = 'block'; statusEl.textContent += msg + '\n'; }

var srcInput = document.getElementById('srcPdf');
var dstInput = document.getElementById('dstPdf');
var transferBtn = document.getElementById('transferBtn');

srcInput.onchange = function(){
  document.getElementById('srcPdfName').textContent = this.files[0] ? this.files[0].name : '';
  checkReady();
};
dstInput.onchange = function(){
  document.getElementById('dstPdfName').textContent = this.files[0] ? this.files[0].name : '';
  checkReady();
};
function checkReady(){
  transferBtn.style.display = (srcInput.files[0] && dstInput.files[0]) ? 'inline-block' : 'none';
}

/* ================================================================
   MAIN: Transfer annotations from source PDF to destination PDF
   ================================================================ */
transferBtn.onclick = async function(){
  var srcFile = srcInput.files[0];
  var dstFile = dstInput.files[0];
  if(!srcFile || !dstFile) return;

  transferBtn.disabled = true;
  transferBtn.textContent = 'Transferring...';
  statusEl.textContent = '';

  try {
    ensurePdfLib();

    /* Step 1: Read annotations from source PDF */
    log('Reading source PDF annotations...');
    var srcData = new Uint8Array(await srcFile.arrayBuffer());
    var srcLib = await PDFDocument.load(srcData, {ignoreEncryption: true});
    var srcPages = srcLib.getPages();
    var annotsByPage = {};
    var totalAnnots = 0;

    for(var pi = 0; pi < srcPages.length; pi++){
      var annotsRef = srcPages[pi].node.get(PDFName.of('Annots'));
      if(!annotsRef) continue;
      var annots = srcPages[pi].node.lookup(PDFName.of('Annots'));
      if(!annots || !(annots instanceof PDFArray)) continue;

      for(var j = 0; j < annots.size(); j++){
        try {
          var ad = srcLib.context.lookup(annots.get(j));
          if(!(ad instanceof PDFDict)) continue;
          var st = ad.get(PDFName.of('Subtype'));
          if(!st) continue;

          /* Extract all fields from this annotation dict */
          var fields = extractAnnotFields(ad, srcLib);
          if(!fields) continue;
          fields.page = pi;

          if(!annotsByPage[pi]) annotsByPage[pi] = [];
          annotsByPage[pi].push(fields);
          totalAnnots++;
        } catch(e){}
      }
    }

    log('Found ' + totalAnnots + ' annotation(s) across ' + srcPages.length + ' source page(s).');
    if(!totalAnnots){
      log('No annotations to transfer.');
      transferBtn.disabled = false;
      transferBtn.textContent = 'Transfer Annos';
      return;
    }

    /* Step 2: Apply annotations to destination PDF */
    log('Loading destination PDF...');
    var dstData = new Uint8Array(await dstFile.arrayBuffer());
    var dstLib = await PDFDocument.load(dstData, {ignoreEncryption: true, updateMetadata: false});
    var dstPages = dstLib.getPages();

    var added = 0;
    for(var pgIdx in annotsByPage){
      var pi = parseInt(pgIdx);
      if(pi >= dstPages.length){
        log('Warning: source page ' + (pi+1) + ' has no matching destination page, skipping ' + annotsByPage[pgIdx].length + ' annotation(s).');
        continue;
      }
      var page = dstPages[pi];
      var pageAnnots = annotsByPage[pgIdx];

      for(var k = 0; k < pageAnnots.length; k++){
        try {
          var annotDict = buildAnnotDict(dstLib, pageAnnots[k]);
          var annotRef = dstLib.context.register(annotDict);

          /* Add to page's /Annots array */
          var existing = page.node.get(PDFName.of('Annots'));
          if(existing){
            var arr = page.node.lookup(PDFName.of('Annots'));
            if(arr instanceof PDFArray){
              arr.push(annotRef);
            }
          } else {
            var newArr = dstLib.context.obj([annotRef]);
            page.node.set(PDFName.of('Annots'), newArr);
          }
          added++;
        } catch(e){
          log('Warning: failed to add annotation: ' + e.message);
        }
      }
    }

    log('Applied ' + added + ' annotation(s) to destination PDF.');
    log('Saving...');

    var outBytes = await dstLib.save();
    var blob = new Blob([outBytes], {type: 'application/pdf'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = dstFile.name.replace(/\.pdf$/i, '') + '_transferred.pdf';
    a.click();

    log('Done! Open in Adobe Acrobat to see annotations.');

  } catch(err){
    log('Error: ' + err.message);
    console.error(err);
  }
  transferBtn.disabled = false;
  transferBtn.textContent = 'Transfer Annos';
};

/* ================================================================
   EXTRACT all fields from a pdf-lib annotation dict
   Returns a plain JS object with string/array values
   ================================================================ */
function extractAnnotFields(ad, lib){
  var st = ad.get(PDFName.of('Subtype'));
  if(!st) return null;
  var rect = ad.get(PDFName.of('Rect'));
  if(!rect) return null;

  var o = {};
  o.subtype = st.toString().replace('/','');
  o.rect = rect.toString();

  /* Every known annotation field — raw .toString() passthrough */
  var stringFields = ['Contents','T','Subj','DA','DS','NM','M','RC','CreationDate'];
  var arrayFields = ['C','BC','IC','L','RD','Border','QuadPoints','Vertices','LE','CL'];
  var dictFields = ['BS','MK'];
  var numFields = ['CA','F','Ff','Q','LL','LLE'];
  var nameFields = ['IT','Name'];
  var otherFields = ['InkList','Cap','Measure','OC','IRT','RT'];

  for(var i = 0; i < stringFields.length; i++){
    var val = ad.get(PDFName.of(stringFields[i]));
    if(val) o['str_' + stringFields[i]] = val.toString();
  }
  for(var i = 0; i < arrayFields.length; i++){
    var val = ad.get(PDFName.of(arrayFields[i]));
    if(val) o['arr_' + arrayFields[i]] = val.toString();
  }
  for(var i = 0; i < dictFields.length; i++){
    var val = ad.get(PDFName.of(dictFields[i]));
    if(val && !(val instanceof PDFRef)) o['dict_' + dictFields[i]] = val.toString();
    else if(val instanceof PDFRef){
      try { var resolved = lib.context.lookup(val); if(resolved && !(resolved instanceof PDFStream)) o['dict_' + dictFields[i]] = resolved.toString(); } catch(e){}
    }
  }
  for(var i = 0; i < numFields.length; i++){
    var val = ad.get(PDFName.of(numFields[i]));
    if(val) o['num_' + numFields[i]] = val.toString();
  }
  for(var i = 0; i < nameFields.length; i++){
    var val = ad.get(PDFName.of(nameFields[i]));
    if(val) o['name_' + nameFields[i]] = val.toString();
  }
  for(var i = 0; i < otherFields.length; i++){
    var val = ad.get(PDFName.of(otherFields[i]));
    if(val && !(val instanceof PDFRef)) o['other_' + otherFields[i]] = val.toString();
  }

  return o;
}

/* ================================================================
   BUILD a pdf-lib annotation dict from extracted fields
   ================================================================ */
function buildAnnotDict(lib, a){
  var dict = lib.context.obj({});
  dict.set(PDFName.of('Type'), PDFName.of('Annot'));
  dict.set(PDFName.of('Subtype'), PDFName.of(a.subtype));

  /* Rect */
  var rectNums = parseNumArray(a.rect);
  if(rectNums) dict.set(PDFName.of('Rect'), lib.context.obj(rectNums));

  /* String fields — strip outer parens, write as PDFString */
  var stringMap = {
    'str_Contents':'Contents', 'str_T':'T', 'str_Subj':'Subj',
    'str_DA':'DA', 'str_DS':'DS', 'str_NM':'NM', 'str_M':'M',
    'str_RC':'RC', 'str_CreationDate':'CreationDate'
  };
  for(var key in stringMap){
    if(a[key]) dict.set(PDFName.of(stringMap[key]), stripParensToString(a[key]));
  }

  /* Array fields — parse numbers */
  var arrayMap = {
    'arr_C':'C', 'arr_BC':'BC', 'arr_IC':'IC', 'arr_L':'L',
    'arr_RD':'RD', 'arr_Border':'Border', 'arr_QuadPoints':'QuadPoints',
    'arr_Vertices':'Vertices', 'arr_CL':'CL'
  };
  for(var key in arrayMap){
    if(a[key]){
      var nums = parseNumArray(a[key]);
      if(nums) dict.set(PDFName.of(arrayMap[key]), lib.context.obj(nums));
    }
  }

  /* LE — array of names like [/None /None] */
  if(a['arr_LE']){
    var leStr = a['arr_LE'];
    var leNames = leStr.match(/\/\w+/g);
    if(leNames){
      var leArr = lib.context.obj([]);
      leNames.forEach(function(n){ leArr.push(PDFName.of(n.substring(1))); });
      dict.set(PDFName.of('LE'), leArr);
    }
  }

  /* Dict fields — parse /BS << /W 2 >> etc */
  if(a['dict_BS']){
    var bsStr = a['dict_BS'];
    var bsDict = lib.context.obj({});
    var wMatch = bsStr.match(/\/W\s+([\d.]+)/);
    if(wMatch) bsDict.set(PDFName.of('W'), PDFNumber.of(parseFloat(wMatch[1])));
    var sMatch = bsStr.match(/\/S\s*\/(\w+)/);
    if(sMatch) bsDict.set(PDFName.of('S'), PDFName.of(sMatch[1]));
    dict.set(PDFName.of('BS'), bsDict);
  }
  if(a['dict_MK']){
    /* MK can be complex — skip for now, rarely needed */
  }

  /* Number fields */
  var numMap = {'num_CA':'CA', 'num_F':'F', 'num_Ff':'Ff', 'num_Q':'Q', 'num_LL':'LL', 'num_LLE':'LLE'};
  for(var key in numMap){
    if(a[key]) dict.set(PDFName.of(numMap[key]), PDFNumber.of(parseFloat(a[key])));
  }

  /* Name fields */
  var nameMap = {'name_IT':'IT', 'name_Name':'Name'};
  for(var key in nameMap){
    if(a[key]) dict.set(PDFName.of(nameMap[key]), PDFName.of(a[key].replace('/','').trim()));
  }

  /* Set print flag if not already set */
  if(!a['num_F']) dict.set(PDFName.of('F'), PDFNumber.of(4));

  return dict;
}

/* Parse "[1.0 2.0 3.0 4.0]" or "1.0 2.0 3.0 4.0" into number array */
function parseNumArray(str){
  if(!str) return null;
  var clean = str.replace(/[\[\]]/g, '').trim();
  if(!clean) return null;
  var parts = clean.split(/\s+/);
  var nums = [];
  for(var i = 0; i < parts.length; i++){
    var n = parseFloat(parts[i]);
    if(!isNaN(n)) nums.push(n);
  }
  return nums.length ? nums : null;
}

/* Strip outer parens from "(content)" and create PDFString */
function stripParensToString(raw){
  if(!raw) return PDFString.of('');
  var s = raw;
  if(s.charAt(0) === '(' && s.charAt(s.length-1) === ')') s = s.substring(1, s.length-1);
  return PDFString.of(s);
}
</script>
</body>
</html>
