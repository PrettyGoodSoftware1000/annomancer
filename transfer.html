<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transfer Annos</title>
<script src="pdf-lib.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    background: #f5f6fa;
    color: #222;
    min-height: 100vh;
  }

  .masthead {
    width: 100%;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    overflow: hidden;
  }
  .masthead img {
    display: block;
    max-width: 1536px;
    width: 100%;
    height: auto;
  }

  .page-content {
    text-align: center;
    padding: 30px;
  }

  .back-link { display:inline-block; margin-bottom:20px; color:#0078ff; text-decoration:none; }
  .back-link:hover { text-decoration:underline; }
  h1 { font-size:28px; font-weight:700; color:#1a1a2e; margin-bottom:8px; }
  .subtitle { color:#666; margin-bottom:30px; font-size:15px; }

  .drop-zone-container {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 0 auto 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .drop-zone {
    width: 300px;
    height: 210px;
    border: 3px dashed #ccc;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: all 0.2s ease;
    cursor: pointer;
    padding: 16px;
  }
  .drop-zone:hover {
    border-color: #0078ff;
    background: #f0f7ff;
  }
  .drop-zone.drag-over {
    border-color: #0078ff;
    background: #e0f0ff;
    transform: scale(1.02);
  }
  .drop-zone.has-file {
    border-color: #28a745;
    background: #e8f5e9;
  }
  .drop-zone h3 {
    margin: 0 0 4px;
    color: #333;
    font-size: 16px;
  }
  .drop-zone .hint {
    color: #999;
    font-size: 12px;
    margin-bottom: 12px;
  }
  .drop-zone .drop-msg {
    color: #888;
    font-size: 14px;
    margin: 4px 0;
  }
  .drop-zone .file-name {
    margin-top: 10px;
    font-weight: 600;
    color: #28a745;
    word-break: break-all;
    padding: 0 10px;
    font-size: 13px;
  }
  .drop-zone input[type="file"] { display:none; }
  .drop-zone .fallback-btn {
    margin-top: 8px;
    padding: 8px 16px;
    background: #0078ff;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .drop-zone .fallback-btn:hover { background:#005fd1; }

  .arrow {
    font-size: 32px;
    color: #bbb;
    user-select: none;
  }

  #transferBtn {
    display: none;
    margin: 0 auto;
    padding: 14px 36px;
    border-radius: 8px;
    border: none;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    background: #0078ff;
    transition: background 0.15s;
  }
  #transferBtn:hover { background:#005fd1; }
  #transferBtn:disabled { background:#aaa; cursor:default; }

  #status {
    margin: 20px auto;
    max-width: 700px;
    font-size: 13px;
    text-align: left;
    background: #fff;
    border-radius: 8px;
    padding: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    white-space: pre-wrap;
    display: none;
  }
</style>
</head>
<body>

<div class="masthead">
  <img src="masthead.png" alt="Annomancer" width="1536" height="514" />
</div>

<div class="page-content">

<a href="index.html" class="back-link">&larr; Back</a>
<h1>Transfer Annos</h1>
<p class="subtitle">Move annos from an old pdf to a new one.</p>

<div class="drop-zone-container">
  <div class="drop-zone" id="srcZone">
    <h3>Old PDF</h3>
    <p class="hint">Take the annos from this file</p>
    <p class="drop-msg">Drop PDF here</p>
    <p class="drop-msg">or</p>
    <button class="fallback-btn" onclick="document.getElementById('srcInput').click()">Select File</button>
    <input type="file" id="srcInput" accept="application/pdf" />
    <div class="file-name" id="srcName"></div>
  </div>

  <div class="arrow">&rarr;</div>

  <div class="drop-zone" id="dstZone">
    <h3>New PDF</h3>
    <p class="hint">Add the annos to this file</p>
    <p class="drop-msg">Drop PDF here</p>
    <p class="drop-msg">or</p>
    <button class="fallback-btn" onclick="document.getElementById('dstInput').click()">Select File</button>
    <input type="file" id="dstInput" accept="application/pdf" />
    <div class="file-name" id="dstName"></div>
  </div>
</div>

<button id="transferBtn">Transfer Annos</button>
<div id="status"></div>

</div>

<script>
var PDFDocument, PDFName, PDFArray, PDFDict, PDFString, PDFHexString, PDFNumber, PDFStream, PDFRef;
function ensurePdfLib(){
  if(!PDFDocument && typeof PDFLib !== 'undefined'){
    PDFDocument = PDFLib.PDFDocument;
    PDFName = PDFLib.PDFName;
    PDFArray = PDFLib.PDFArray;
    PDFDict = PDFLib.PDFDict;
    PDFString = PDFLib.PDFString;
    PDFHexString = PDFLib.PDFHexString;
    PDFNumber = PDFLib.PDFNumber;
    PDFStream = PDFLib.PDFStream;
    PDFRef = PDFLib.PDFRef;
  }
}

var statusEl = document.getElementById('status');
function log(msg){ statusEl.style.display = 'block'; statusEl.textContent += msg + '\n'; }

var srcFile = null;
var dstFile = null;
var transferBtn = document.getElementById('transferBtn');

/* ================================================================
   DRAG & DROP SETUP
   ================================================================ */
function setupDropZone(zoneId, inputId, nameId, onFile){
  var zone = document.getElementById(zoneId);
  var input = document.getElementById(inputId);
  var nameEl = document.getElementById(nameId);

  zone.addEventListener('dragover', function(e){
    e.preventDefault();
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', function(){
    zone.classList.remove('drag-over');
  });
  zone.addEventListener('drop', function(e){
    e.preventDefault();
    zone.classList.remove('drag-over');
    var files = e.dataTransfer.files;
    if(files.length > 0 && files[0].type === 'application/pdf'){
      handleZoneFile(files[0], zone, nameEl, onFile);
    }
  });
  zone.addEventListener('click', function(e){
    if(e.target.tagName !== 'BUTTON') input.click();
  });
  input.addEventListener('change', function(){
    if(this.files[0]){
      handleZoneFile(this.files[0], zone, nameEl, onFile);
    }
  });
}

function handleZoneFile(file, zone, nameEl, onFile){
  zone.classList.add('has-file');
  nameEl.textContent = file.name;
  /* Hide the drop messages */
  var msgs = zone.querySelectorAll('.drop-msg, .fallback-btn');
  for(var i = 0; i < msgs.length; i++) msgs[i].style.display = 'none';
  onFile(file);
}

setupDropZone('srcZone', 'srcInput', 'srcName', function(file){
  srcFile = file;
  checkReady();
});
setupDropZone('dstZone', 'dstInput', 'dstName', function(file){
  dstFile = file;
  checkReady();
});

function checkReady(){
  transferBtn.style.display = (srcFile && dstFile) ? 'inline-block' : 'none';
}

/* ================================================================
   MAIN: Transfer annotations from source PDF to destination PDF
   ================================================================ */
transferBtn.onclick = async function(){
  if(!srcFile || !dstFile) return;

  transferBtn.disabled = true;
  transferBtn.textContent = 'Transferring...';
  statusEl.textContent = '';

  try {
    ensurePdfLib();

    log('Reading old PDF annotations...');
    var srcData = new Uint8Array(await srcFile.arrayBuffer());
    var srcLib = await PDFDocument.load(srcData, {ignoreEncryption: true});
    var srcPages = srcLib.getPages();
    var annotsByPage = {};
    var totalAnnots = 0;

    for(var pi = 0; pi < srcPages.length; pi++){
      var annotsRef = srcPages[pi].node.get(PDFName.of('Annots'));
      if(!annotsRef) continue;
      var annots = srcPages[pi].node.lookup(PDFName.of('Annots'));
      if(!annots || !(annots instanceof PDFArray)) continue;

      for(var j = 0; j < annots.size(); j++){
        try {
          var ad = srcLib.context.lookup(annots.get(j));
          if(!(ad instanceof PDFDict)) continue;
          var st = ad.get(PDFName.of('Subtype'));
          if(!st) continue;

          var fields = extractAnnotFields(ad, srcLib);
          if(!fields) continue;
          fields.page = pi;

          if(!annotsByPage[pi]) annotsByPage[pi] = [];
          annotsByPage[pi].push(fields);
          totalAnnots++;
        } catch(e){}
      }
    }

    log('Found ' + totalAnnots + ' annotation(s) across ' + srcPages.length + ' page(s).');
    if(!totalAnnots){
      log('No annotations to transfer.');
      transferBtn.disabled = false;
      transferBtn.textContent = 'Transfer Annos';
      return;
    }

    log('Loading new PDF...');
    var dstData = new Uint8Array(await dstFile.arrayBuffer());
    _sharedFontRef = null; _sharedFontLib = null; /* reset for new PDF context */
    var dstLib = await PDFDocument.load(dstData, {ignoreEncryption: true, updateMetadata: false});
    var dstPages = dstLib.getPages();

    var added = 0;
    for(var pgIdx in annotsByPage){
      var pi = parseInt(pgIdx);
      if(pi >= dstPages.length){
        log('Warning: old page ' + (pi+1) + ' has no matching new page, skipping ' + annotsByPage[pgIdx].length + ' annotation(s).');
        continue;
      }
      var page = dstPages[pi];
      var pageAnnots = annotsByPage[pgIdx];

      for(var k = 0; k < pageAnnots.length; k++){
        try {
          var annotDict = buildAnnotDict(dstLib, pageAnnots[k]);
          var annotRef = dstLib.context.register(annotDict);

          var existing = page.node.get(PDFName.of('Annots'));
          if(existing){
            var arr = page.node.lookup(PDFName.of('Annots'));
            if(arr instanceof PDFArray) arr.push(annotRef);
          } else {
            var newArr = dstLib.context.obj([annotRef]);
            page.node.set(PDFName.of('Annots'), newArr);
          }
          added++;
        } catch(e){
          log('Warning: failed to add annotation: ' + e.message);
        }
      }
    }

    log('Applied ' + added + ' annotation(s) to new PDF.');
    log('Saving...');

    var outBytes = await dstLib.save();
    var blob = new Blob([outBytes], {type: 'application/pdf'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = dstFile.name.replace(/\.pdf$/i, '') + '_annos.pdf';
    a.click();

    log('Done! Open in Adobe Acrobat to see annotations.');

  } catch(err){
    log('Error: ' + err.message);
    console.error(err);
  }
  transferBtn.disabled = false;
  transferBtn.textContent = 'Transfer Annos';
};

/* ================================================================
   EXTRACT all fields from a pdf-lib annotation dict
   ================================================================ */
function extractAnnotFields(ad, lib){
  var st = ad.get(PDFName.of('Subtype'));
  if(!st) return null;
  var rect = ad.get(PDFName.of('Rect'));
  if(!rect) return null;

  var o = {};
  o.subtype = st.toString().replace('/','');
  o.rect = rect.toString();

  var stringFields = ['Contents','T','Subj','DA','DS','NM','M','RC','CreationDate'];
  var arrayFields = ['C','BC','IC','L','RD','Border','QuadPoints','Vertices','LE','CL'];
  var dictFields = ['BS','MK'];
  var numFields = ['CA','F','Ff','Q','LL','LLE'];
  var nameFields = ['IT','Name'];
  var otherFields = ['InkList','Cap','Measure','OC','IRT','RT'];

  for(var i = 0; i < stringFields.length; i++){
    var val = ad.get(PDFName.of(stringFields[i]));
    if(val) o['str_' + stringFields[i]] = val.toString();
  }
  for(var i = 0; i < arrayFields.length; i++){
    var val = ad.get(PDFName.of(arrayFields[i]));
    if(val) o['arr_' + arrayFields[i]] = val.toString();
  }
  for(var i = 0; i < dictFields.length; i++){
    var val = ad.get(PDFName.of(dictFields[i]));
    if(val && !(val instanceof PDFRef)) o['dict_' + dictFields[i]] = val.toString();
    else if(val instanceof PDFRef){
      try { var resolved = lib.context.lookup(val); if(resolved && !(resolved instanceof PDFStream)) o['dict_' + dictFields[i]] = resolved.toString(); } catch(e){}
    }
  }
  for(var i = 0; i < numFields.length; i++){
    var val = ad.get(PDFName.of(numFields[i]));
    if(val) o['num_' + numFields[i]] = val.toString();
  }
  for(var i = 0; i < nameFields.length; i++){
    var val = ad.get(PDFName.of(nameFields[i]));
    if(val) o['name_' + nameFields[i]] = val.toString();
  }
  for(var i = 0; i < otherFields.length; i++){
    var val = ad.get(PDFName.of(otherFields[i]));
    if(val && !(val instanceof PDFRef)) o['other_' + otherFields[i]] = val.toString();
  }

  return o;
}

/* ================================================================
   BUILD a pdf-lib annotation dict from extracted fields
   ================================================================ */
function buildAnnotDict(lib, a){
  var dict = lib.context.obj({});
  dict.set(PDFName.of('Type'), PDFName.of('Annot'));
  dict.set(PDFName.of('Subtype'), PDFName.of(a.subtype));

  var rectNums = parseNumArray(a.rect);
  if(rectNums) dict.set(PDFName.of('Rect'), lib.context.obj(rectNums));

  var stringMap = {
    'str_Contents':'Contents', 'str_T':'T', 'str_Subj':'Subj',
    'str_DA':'DA', 'str_DS':'DS', 'str_NM':'NM', 'str_M':'M',
    'str_RC':'RC', 'str_CreationDate':'CreationDate'
  };
  for(var key in stringMap){
    if(a[key]) dict.set(PDFName.of(stringMap[key]), stripParensToString(a[key]));
  }

  var arrayMap = {
    'arr_C':'C', 'arr_BC':'BC', 'arr_IC':'IC', 'arr_L':'L',
    'arr_RD':'RD', 'arr_Border':'Border', 'arr_QuadPoints':'QuadPoints',
    'arr_Vertices':'Vertices', 'arr_CL':'CL'
  };
  for(var key in arrayMap){
    if(a[key]){
      var nums = parseNumArray(a[key]);
      if(nums) dict.set(PDFName.of(arrayMap[key]), lib.context.obj(nums));
    }
  }

  if(a['arr_LE']){
    var leStr = a['arr_LE'];
    var leNames = leStr.match(/\/\w+/g);
    if(leNames){
      var leArr = lib.context.obj([]);
      leNames.forEach(function(n){ leArr.push(PDFName.of(n.substring(1))); });
      dict.set(PDFName.of('LE'), leArr);
    }
  }

  if(a['dict_BS']){
    var bsStr = a['dict_BS'];
    var bsDict = lib.context.obj({});
    var wMatch = bsStr.match(/\/W\s+([\d.]+)/);
    if(wMatch) bsDict.set(PDFName.of('W'), PDFNumber.of(parseFloat(wMatch[1])));
    var sMatch = bsStr.match(/\/S\s*\/(\w+)/);
    if(sMatch) bsDict.set(PDFName.of('S'), PDFName.of(sMatch[1]));
    dict.set(PDFName.of('BS'), bsDict);
  }

  var numMap = {'num_CA':'CA', 'num_F':'F', 'num_Ff':'Ff', 'num_Q':'Q', 'num_LL':'LL', 'num_LLE':'LLE'};
  for(var key in numMap){
    if(a[key]) dict.set(PDFName.of(numMap[key]), PDFNumber.of(parseFloat(a[key])));
  }

  var nameMap = {'name_IT':'IT', 'name_Name':'Name'};
  for(var key in nameMap){
    if(a[key]) dict.set(PDFName.of(nameMap[key]), PDFName.of(a[key].replace('/','').trim()));
  }

  if(!a['num_F']) dict.set(PDFName.of('F'), PDFNumber.of(4));

  /* Generate /AP (appearance stream) for Square and Line annotations.
     FreeText AP is regenerated by Adobe from /DA + /RC automatically. */
  var ap = generateAppearanceStream(lib, a);
  if(ap) dict.set(PDFName.of('AP'), ap);

  return dict;
}

function parseNumArray(str){
  if(!str) return null;
  var clean = str.replace(/[\[\]]/g, '').trim();
  if(!clean) return null;
  var parts = clean.split(/\s+/);
  var nums = [];
  for(var i = 0; i < parts.length; i++){
    var n = parseFloat(parts[i]);
    if(!isNaN(n)) nums.push(n);
  }
  return nums.length ? nums : null;
}

function stripParensToString(raw){
  if(!raw) return PDFString.of('');
  var s = raw;
  if(s.charAt(0) === '(' && s.charAt(s.length-1) === ')') s = s.substring(1, s.length-1);
  return PDFString.of(s);
}

/* ================================================================
   GENERATE /AP (Appearance Stream) for annotations
   Creates the visual rendering so Acrobat doesn't need to repair.
   Supports: Square, Line, FreeText.
   ================================================================ */

/* Shared Helvetica font ref — created once per destination PDF */
var _sharedFontRef = null;
var _sharedFontLib = null;

function getSharedFontRef(lib){
  if(_sharedFontLib === lib && _sharedFontRef) return _sharedFontRef;
  /* Create a minimal Type1 font dict for Helvetica (standard base-14, no embedding needed) */
  var fontDict = lib.context.obj({});
  fontDict.set(PDFName.of('Type'), PDFName.of('Font'));
  fontDict.set(PDFName.of('Subtype'), PDFName.of('Type1'));
  fontDict.set(PDFName.of('BaseFont'), PDFName.of('Helvetica'));
  _sharedFontRef = lib.context.register(fontDict);
  _sharedFontLib = lib;
  return _sharedFontRef;
}

function generateAppearanceStream(lib, a){
  if(a.subtype === 'Square') return generateSquareAP(lib, a);
  if(a.subtype === 'Line') return generateLineAP(lib, a);
  if(a.subtype === 'FreeText') return generateFreeTextAP(lib, a);
  return null;
}

function generateSquareAP(lib, a){
  var rect = parseNumArray(a.rect);
  if(!rect || rect.length < 4) return null;
  var x1 = Math.min(rect[0],rect[2]), y1 = Math.min(rect[1],rect[3]);
  var x2 = Math.max(rect[0],rect[2]), y2 = Math.max(rect[1],rect[3]);

  /* Get color from /C array */
  var color = [0, 0, 0];
  if(a['arr_C']){
    var c = parseNumArray(a['arr_C']);
    if(c && c.length >= 3) color = c;
  }

  /* Get border width from /BS << /W N >> */
  var lineWidth = 2;
  if(a['dict_BS']){
    var wm = a['dict_BS'].match(/\/W\s+([\d.]+)/);
    if(wm) lineWidth = parseFloat(wm[1]);
  }

  /* Get RD (insets) */
  var rd = [1, 1, 1, 1];
  if(a['arr_RD']){
    var rdNums = parseNumArray(a['arr_RD']);
    if(rdNums && rdNums.length >= 4) rd = rdNums;
  }

  /* Build the stream content — matches Adobe's format exactly */
  var innerX = x1 + rd[0];
  var innerY = y1 + rd[1];
  var innerW = (x2 - x1) - rd[0] - rd[2];
  var innerH = (y2 - y1) - rd[1] - rd[3];

  var stream = '';
  stream += color[0]+' '+color[1]+' '+color[2]+' RG\n';
  stream += lineWidth + ' w\n';
  stream += innerX+' '+innerY+' '+innerW+' '+innerH+' re\n';
  stream += 'S\n';

  return buildAPDict(lib, rect, stream, null);
}

function generateLineAP(lib, a){
  var rect = parseNumArray(a.rect);
  if(!rect || rect.length < 4) return null;
  var x1 = Math.min(rect[0],rect[2]), y1 = Math.min(rect[1],rect[3]);

  /* Get line endpoints from /L */
  var endpoints = null;
  if(a['arr_L']) endpoints = parseNumArray(a['arr_L']);
  if(!endpoints || endpoints.length < 4) return null;

  /* Get color */
  var color = [0, 0, 0];
  if(a['arr_C']){
    var c = parseNumArray(a['arr_C']);
    if(c && c.length >= 3) color = c;
  }

  /* Get border width */
  var lineWidth = 1;
  if(a['dict_BS']){
    var wm = a['dict_BS'].match(/\/W\s+([\d.]+)/);
    if(wm) lineWidth = parseFloat(wm[1]);
  }

  var stream = '';
  stream += color[0]+' '+color[1]+' '+color[2]+' RG\n';
  stream += endpoints[0]+' '+endpoints[1]+' m\n';
  stream += endpoints[2]+' '+endpoints[3]+' l\n';
  stream += 'S\n';

  return buildAPDict(lib, rect, stream, null);
}

function generateFreeTextAP(lib, a){
  var rect = parseNumArray(a.rect);
  if(!rect || rect.length < 4) return null;
  var x1 = Math.min(rect[0],rect[2]), y1 = Math.min(rect[1],rect[3]);
  var x2 = Math.max(rect[0],rect[2]), y2 = Math.max(rect[1],rect[3]);

  /* Parse /DA string — this is the single source of truth for font + text color.
     Example: "0.235 0.706 0.294 rg /Arial 10 Tf" */
  var daStr = '';
  if(a['str_DA']){
    daStr = a['str_DA'];
    if(daStr.charAt(0) === '(') daStr = daStr.substring(1, daStr.length - 1);
  }

  var fontName = 'Helv';
  var fontSize = 10;
  var textColor = null;
  var fontMatch = daStr.match(/\/(\S+)\s+([\d.]+)\s+Tf/);
  if(fontMatch){ fontName = fontMatch[1]; fontSize = parseFloat(fontMatch[2]); }
  var daColorMatch = daStr.match(/([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+rg/);
  if(daColorMatch) textColor = [parseFloat(daColorMatch[1]), parseFloat(daColorMatch[2]), parseFloat(daColorMatch[3])];

  /* Border color: try /BC first, then fall back to text color from /DA, then /DS hex */
  var strokeColor = null;
  if(a['arr_BC']){
    var bc = parseNumArray(a['arr_BC']);
    if(bc && bc.length >= 3) strokeColor = bc;
  }
  if(!strokeColor && textColor) strokeColor = textColor.slice();
  if(!strokeColor && a['str_DS']){
    var dsStr = a['str_DS'];
    if(dsStr.charAt(0) === '(') dsStr = dsStr.substring(1, dsStr.length - 1);
    var hexMatch = dsStr.match(/color:\s*#([0-9a-fA-F]{6})/);
    if(hexMatch){
      var hex = hexMatch[1];
      strokeColor = [parseInt(hex.substr(0,2),16)/255, parseInt(hex.substr(2,2),16)/255, parseInt(hex.substr(4,2),16)/255];
    }
  }
  if(!strokeColor) strokeColor = [0, 0, 0];
  if(!textColor) textColor = strokeColor.slice();

  /* Fill color from /C (background) */
  var fillColor = [1, 1, 0.988235];
  if(a['arr_C']){
    var c = parseNumArray(a['arr_C']);
    if(c && c.length >= 3) fillColor = c;
  }

  /* Border width from /BS */
  var lineWidth = 2;
  if(a['dict_BS']){
    var wm = a['dict_BS'].match(/\/W\s+([\d.]+)/);
    if(wm) lineWidth = parseFloat(wm[1]);
  }

  /* Text content from /Contents */
  var text = '';
  if(a['str_Contents']){
    text = a['str_Contents'];
    if(text.charAt(0) === '(') text = text.substring(1, text.length - 1);
  }

  /* Split text into lines */
  var lines = text.split(/\\r|\\n|\r|\n/);

  /* Round colors to 6 decimal places like Adobe does */
  function r6(n){ return Math.round(n * 1000000) / 1000000; }
  function escPdf(s){ return s.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }

  /* Geometry — matching Adobe's exact pattern from the decompressed streams */
  var pad = 1;
  var innerPad = 3;
  var outerX = x1 + pad;
  var outerY = y1 + pad;
  var outerW = (x2 - x1) - pad * 2;
  var outerH = (y2 - y1) - pad * 2;
  var clipX = outerX + innerPad;
  var clipY = outerY + innerPad;
  var clipW = outerW - innerPad * 2;
  var clipH = outerH - innerPad * 2;

  /* Text Y: Adobe places first baseline at clipTop - fontSize * 0.2 (ascent offset) */
  var lineHeight = fontSize * 1.2;
  var textStartY = y2 - pad - innerPad - fontSize + (fontSize * 0.104);

  /* Build the stream — matching Adobe's decompressed FreeText AP exactly */
  var stream = '';

  /* 1. Fill background + stroke border */
  stream += r6(fillColor[0])+' '+r6(fillColor[1])+' '+r6(fillColor[2])+' rg\n';
  stream += r6(strokeColor[0])+' '+r6(strokeColor[1])+' '+r6(strokeColor[2])+' RG\n';
  stream += lineWidth+' w\n';
  stream += outerX+' '+outerY+' '+outerW+' '+outerH+' re\n';
  stream += 'B\n';

  /* 2. Clip to text area */
  stream += 'q\n';
  stream += '1 0 0 1 0 0 cm\n';
  stream += clipX+' '+clipY+' '+clipW+' '+clipH+' re\n';
  stream += 'W\nn\n';

  /* 3. Draw text */
  stream += '0 g\n0 G\n1 w\n';
  stream += 'BT\n';
  stream += '/'+fontName+' '+fontSize+' Tf\n';
  stream += r6(textColor[0])+' '+r6(textColor[1])+' '+r6(textColor[2])+' rg\n';

  /* First line: absolute position with Td */
  if(lines.length > 0){
    stream += clipX+' '+r6(textStartY)+' Td\n';
    stream += '('+escPdf(lines[0])+') Tj\n';
  }
  /* Subsequent lines: relative Td (0, -lineHeight) from previous position */
  for(var i = 1; i < lines.length; i++){
    stream += '0 '+r6(-lineHeight)+' Td\n';
    stream += '('+escPdf(lines[i])+') Tj\n';
  }

  stream += 'ET\n';
  stream += 'Q\n';

  /* Build with font resources */
  var fontRef = getSharedFontRef(lib);
  return buildAPDict(lib, rect, stream, {name: fontName, ref: fontRef});
}

/* Build the /AP << /N streamRef >> structure with a Form XObject */
function buildAPDict(lib, rect, streamContent, fontInfo){
  var x1 = Math.min(rect[0],rect[2]), y1 = Math.min(rect[1],rect[3]);
  var x2 = Math.max(rect[0],rect[2]), y2 = Math.max(rect[1],rect[3]);

  var streamBytes = new TextEncoder().encode(streamContent);

  /* Create the Form XObject stream */
  var formDict = lib.context.obj({});
  formDict.set(PDFName.of('Type'), PDFName.of('XObject'));
  formDict.set(PDFName.of('Subtype'), PDFName.of('Form'));
  formDict.set(PDFName.of('FormType'), PDFNumber.of(1));
  formDict.set(PDFName.of('BBox'), lib.context.obj([rect[0], rect[1], rect[2], rect[3]]));
  formDict.set(PDFName.of('Matrix'), lib.context.obj([1, 0, 0, 1, -x1, -y1]));

  /* Resources */
  var resources = lib.context.obj({});
  if(fontInfo){
    /* FreeText needs /Font and /ProcSet with /Text */
    var fontDict = lib.context.obj({});
    fontDict.set(PDFName.of(fontInfo.name), fontInfo.ref);
    resources.set(PDFName.of('Font'), fontDict);
    resources.set(PDFName.of('ProcSet'), lib.context.obj([PDFName.of('PDF'), PDFName.of('Text')]));
  } else {
    resources.set(PDFName.of('ProcSet'), lib.context.obj([PDFName.of('PDF')]));
  }
  formDict.set(PDFName.of('Resources'), resources);

  /* Create the stream and register it */
  var formStream = lib.context.stream(streamBytes, formDict);
  var formRef = lib.context.register(formStream);

  /* Build /AP << /N formRef >> */
  var apDict = lib.context.obj({});
  apDict.set(PDFName.of('N'), formRef);
  return apDict;
}
</script>
